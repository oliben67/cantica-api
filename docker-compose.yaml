services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cantica
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: cantica
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cantica -d cantica"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  cantica:
    build: .
    ports:
      - "8042:8042"
    volumes:
      - cantica_data:/data
    environment:
      CANTICA_VAULT_PATH: /data
      CANTICA_DATABASE_URL: "postgresql+psycopg2://cantica:secret@postgres:5432/cantica"
      CANTICA_AUTH_ENABLED: "false"
      CANTICA_LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      default: {}
      frontend:
        aliases:
          - api
    restart: unless-stopped

volumes:
  postgres_data:
  cantica_data:

networks:
  frontend:
    name: cantica_default
    external: true
